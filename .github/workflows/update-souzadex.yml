name: Update Souzadex

on:
  push:
    branches: [main]
    paths:
      - "assets/images/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # O rename precisa ser COMMITADO antes de gerar o souzas.js, senão o
      # git log --follow não encontra o histórico do novo nome.
      - name: Renomear imagens para minúsculo
        run: |
          renamed=0
          shopt -s nullglob
          for f in assets/images/*; do
            base=$(basename "$f")
            lower=$(echo "$base" | tr '[:upper:]' '[:lower:]')
            if [ "$base" != "$lower" ]; then
              if git ls-files --error-unmatch "assets/images/$lower" >/dev/null 2>&1; then
                echo "aviso: assets/images/$lower já existe, pulando $base"
                continue
              fi
              git mv "$f" "assets/images/$lower"
              renamed=1
            fi
          done
          if [ "$renamed" -eq 1 ]; then
            git commit -m "chore: renomeia imagens para minusculo"
          fi

      - name: Gerar souzas.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/generate-souzas.sh

      - name: Commitar e enviar mudanças
        run: |
          if ! git diff --quiet souzas.json; then
            git add souzas.json
            git commit -m "chore: atualiza souzas.json"
          fi
          if [ "$(git rev-list --count origin/main..HEAD)" -eq 0 ]; then
            echo "Nada para enviar."
            exit 0
          fi
          git push
